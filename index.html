<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonsieurBoivin.fr — Bientôt en ligne</title>
  <link rel="icon" href="logo.jpg" type="image/png">
  <style>
    /* Fond animé */
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(-45deg, #0e0e0e, #1a1a1a, #222222, #0e0e0e);
      background-size: 400% 400%;
      animation: backgroundShift 15s ease infinite;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    @keyframes backgroundShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Animation fade-in + slide */
    .fade-in-up {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 1s ease forwards;
    }

    .fade-in-up:nth-child(2) { animation-delay: 0.2s; }
    .fade-in-up:nth-child(3) { animation-delay: 0.4s; }
    .fade-in-up:nth-child(4) { animation-delay: 0.6s; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo */
    img.logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 2rem;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      max-width: 500px;
      margin-bottom: 2rem;
      opacity: 0.85;
    }

    .socials {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .socials a {
      background-color: #ffffff;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .socials a:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.2);
    }

    .socials svg {
      width: 24px;
      height: 24px;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }
      p {
        font-size: 1rem;
        padding: 0 1rem;
      }
      .socials svg {
        width: 22px;
        height: 22px;
      }
    }
  </style>
</head>
<body>
  <img src="logo.jpg" alt="Logo MonsieurBoivin" class="logo fade-in-up">
  <h1 class="fade-in-up">🚧 MonsieurBoivin.fr 🚧</h1>
  <p class="fade-in-up">Le repaire d’un créatif et bricoleur, entre bidouilles du quotidien, aventures et projets perso divers et variés ! Bientôt en ligne ...</p>

  <div class="socials fade-in-up">

      <svg viewBox="0 0 320 512" xmlns="http://www.w3.org/2000/svg">
