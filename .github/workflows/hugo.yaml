name: Build and deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
defaults:
  run:
    shell: bash
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DART_SASS_VERSION: 1.93.2
      GO_VERSION: 1.25.1
      HUGO_VERSION: 0.155.2
      NODE_VERSION: 22.18.0
      TZ: Europe/Oslo
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Create directory for user-specific executable files
        run: |
          mkdir -p "${HOME}/.local"
      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"
      - name: Install Hugo
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"
      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"
      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true
      - name: Configure Git
        run: |
          git config core.quotepath false
      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: hugo-
      - name: Build the site
        run: |
          hugo \
            --gc \
            --minify \
            --panicOnWarning \
            --printPathWarnings \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"
      - name: Check internal links
        env:
          BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const publicDir = path.join(process.cwd(), "public");
          const rawBaseUrl = process.env.BASE_URL || "/";
          const basePath = new URL(rawBaseUrl, "https://example.com").pathname.replace(/\/$/, "");
          const htmlFiles = [];
          const brokenLinks = [];

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath);
              } else if (entry.isFile() && entry.name.endsWith(".html")) {
                htmlFiles.push(fullPath);
              }
            }
          }

          function normalizeTarget(rawTarget, currentFile) {
            if (!rawTarget || rawTarget.startsWith("#")) return null;
            if (/^(mailto:|tel:|data:|javascript:)/i.test(rawTarget)) return null;
            if (/^https?:/i.test(rawTarget)) return null;
            if (rawTarget.startsWith("//")) return null;

            if (rawTarget.startsWith("/")) {
              let sitePath = decodeURIComponent(rawTarget.split("#")[0].split("?")[0]);

              if (basePath && sitePath.startsWith(`${basePath}/`)) {
                sitePath = sitePath.slice(basePath.length);
              } else if (basePath && sitePath === basePath) {
                sitePath = "/";
              }

              return sitePath.replace(/^\/+/, "");
            }

            const currentUrl = new URL(`file://${currentFile.replace(/\\/g, "/")}`);
            const resolved = new URL(rawTarget, currentUrl);

            if (resolved.protocol !== "file:") return null;

            let pathname = decodeURIComponent(resolved.pathname);
            if (process.platform === "win32" && pathname.startsWith("/")) {
              pathname = pathname.slice(1);
            }

            const relativePath = path.relative(publicDir, pathname);
            if (relativePath.startsWith("..")) return `outside-public:${rawTarget}`;

            return relativePath;
          }

          function targetExists(relativePath) {
            const cleanPath = relativePath.split("#")[0].split("?")[0];
            const fullPath = path.join(publicDir, cleanPath);

            if (fs.existsSync(fullPath)) {
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                return fs.existsSync(path.join(fullPath, "index.html"));
              }
              return true;
            }

            if (!path.extname(fullPath)) {
              return fs.existsSync(path.join(fullPath, "index.html")) || fs.existsSync(`${fullPath}.html`);
            }

            return false;
          }

          walk(publicDir);

          const linkPattern = /\b(?:href|src)=["']([^"'#][^"']*)["']/gi;

          for (const htmlFile of htmlFiles) {
            const html = fs.readFileSync(htmlFile, "utf8");
            for (const match of html.matchAll(linkPattern)) {
              const rawTarget = match[1].trim();
              const normalized = normalizeTarget(rawTarget, htmlFile);

              if (!normalized) continue;
              if (normalized.startsWith("outside-public:") || !targetExists(normalized)) {
                brokenLinks.push({
                  file: path.relative(process.cwd(), htmlFile),
                  target: rawTarget,
                });
              }
            }
          }

          if (brokenLinks.length > 0) {
            console.error("Broken internal links detected:");
            for (const issue of brokenLinks) {
              console.error(`- ${issue.file} -> ${issue.target}`);
            }
            process.exit(1);
          }

          console.log(`Checked ${htmlFiles.length} HTML files: no broken internal links found.`);
          EOF
      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
