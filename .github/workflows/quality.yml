name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HUGO_VERSION: 0.150.0
      NODE_VERSION: 22.18.0

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Hugo
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate inventory
        run: npm run audit:inventory

      - name: Check formatting
        run: npm run format:check

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css

      - name: Build static site
        run: npm run build:site:ci

      - name: Check links and anchors
        run: npm run audit:links

      - name: Check SEO templates
        run: npm run audit:seo

      - name: Validate HTML
        run: npm run audit:html

      - name: Run accessibility suite
        run: npm run test:a11y

      - name: Run shell smoke tests
        run: npm run test:e2e

      - name: Run Lighthouse CI
        run: npm run lhci

      - name: Upload Playwright report
        if: ${{ always() && hashFiles('playwright-report/**/*') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Lighthouse reports
        if: ${{ always() && hashFiles('.lighthouseci/**/*') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
